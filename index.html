<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@griffoh_123 - Insta.Quest</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.5rem;
      color: #f5c518;
    }

    header p {
      color: #cccccc;
      margin-top: 0.3rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
    }

    .stat {
      text-align: center;
    }

    .stat h2 {
      color: #f5c518;
      font-size: 1.5rem;
    }

    .stat p {
      color: #aaaaaa;
      font-size: 0.9rem;
    }

    .bio {
      text-align: center;
      max-width: 500px;
      margin-bottom: 2rem;
      line-height: 1.5;
      color: #dddddd;
    }

    .insta-btn {
      background-color: #E1306C;
      color: #ffffff;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.3s;
    }

    .insta-btn:hover {
      background-color: #c1275b;
    }

    footer {
      margin-top: auto;
      color: #777777;
      font-size: 0.8rem;
      text-align: center;
    }

    footer a {
      color: #777777;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>@griffoh_123</h1>
    <p>Insta.Quest</p>
  </header>

  <div class="stats">
    <div class="stat">
      <h2>18</h2>
      <p>Posts</p>
    </div>
    <div class="stat">
      <h2>2.1K</h2>
      <p>Followers</p>
    </div>
    <div class="stat">
      <h2>420</h2>
      <p>Following</p>
    </div>
  </div>

  <div class="bio">
    Sound designer · Short demo creator & creative experimenter.<br>
    Follow for updates & new work.
  </div>

  <a href="https://www.instagram.com/griffoh_123/" target="_blank" class="insta-btn">
    Follow on Instagram
  </a>

  <footer>
    © 2026 <a href="https://github.com/griffoh_123">@griffoh_123</a> — Built with ❤️
  </footer>

</body>
</html>
